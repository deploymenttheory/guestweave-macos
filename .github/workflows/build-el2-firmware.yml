# Builds a custom EDK2 ArmVirtQemu AARCH64 firmware that uses the ARM **physical**
# generic timer instead of the virtual one, then opens a PR committing the result.
#
# Why: Apple's Hypervisor.framework has a bug (Apple Feedback FB21649319) where a
# guest running at EL2 with the in-kernel vGIC (hv_gic) NEVER receives the VIRTUAL
# timer interrupt (CNTV / PPI 27). Stock edk2 ArmVirtQemu uses the virtual timer,
# so our internal/hvmm EL2 VMM stalls at the UEFI boot manager waiting for a timer
# tick that never arrives. The QEMU "HVF: platform vGIC and nested virtualisation"
# series documents the fix: build the firmware against the PHYSICAL timer
# (ArmGenericTimerPhyCounterLib) — the Apple vGIC *does* deliver the physical-timer
# PPI at EL2. This workflow performs that one-line library swap and rebuilds.
#
# Refs: https://www.mail-archive.com/qemu-devel@nongnu.org/msg1173078.html (FB21649319)
#       https://www.mail-archive.com/qemu-devel@nongnu.org/msg1131823.html (CNTHCTL_EL2)
name: Build EL2 firmware (physical-timer edk2)

on:
  workflow_dispatch:
    inputs:
      edk2_tag:
        description: edk2 git tag to build
        default: edk2-stable202408
        required: false
      build_target:
        description: edk2 build target (DEBUG keeps the verbose firmware log)
        default: DEBUG
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout weave (PR target)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v7.0.0

      # The edk2 build itself runs inside a Docker container, as requested, so the
      # toolchain is fully pinned/reproducible and isolated from the runner.
      - name: Build physical-timer edk2 in Docker
        run: |
          set -euxo pipefail
          mkdir -p "$PWD/out"
          docker run --rm \
            -e EDK2_TAG="${{ github.event.inputs.edk2_tag || 'edk2-stable202408' }}" \
            -e TARGET="${{ github.event.inputs.build_target || 'DEBUG' }}" \
            -v "$PWD/out:/out" \
            ubuntu:22.04 bash -euxo pipefail -c '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                git build-essential uuid-dev iasl nasm python3 python3-venv \
                python-is-python3 gcc-aarch64-linux-gnu ca-certificates
              # Init ONLY the submodules the ArmVirtQemu AARCH64 build needs. Most are
              # not compiled but are required for .dec meta-data validation: edk2 errors
              # (000E) if any include dir listed in a parsed package's .dec is missing on
              # disk. The packages parsed here unconditionally reference these submodule
              # include dirs — MdePkg.dec (libfdt, mipisyst), CryptoPkg.dec (openssl,
              # mbedtls), MdeModulePkg.dec (brotli), SecurityPkg.dec (libspdm), plus
              # ArmSoftFloatLib and the BaseTools brotli that actually compile.
              # This still skips the UnitTestFrameworkPkg (cmocka/googletest/subhook) and
              # RedfishPkg (jansson) / RegEx (oniguruma) submodules, whose .dec files are
              # not parsed by a platform firmware build — so subhook, the flaky repo that
              # broke CI, is never cloned, and GitHub rate-limit exposure is cut.
              export GIT_TERMINAL_PROMPT=0
              SUBMODULES="
                BaseTools/Source/C/BrotliCompress/brotli
                MdeModulePkg/Library/BrotliCustomDecompressLib/brotli
                CryptoPkg/Library/OpensslLib/openssl
                CryptoPkg/Library/MbedTlsLib/mbedtls
                MdePkg/Library/BaseFdtLib/libfdt
                MdePkg/Library/MipiSysTLib/mipisyst
                SecurityPkg/DeviceSecurity/SpdmLib/libspdm
                ArmPkg/Library/ArmSoftFloatLib/berkeley-softfloat-3
              "
              # Retry the clone AND scoped submodule init together as one unit. A
              # transient GitHub error can leave an incomplete clone that still exits 0
              # but whose index has no submodule gitlinks — then every
              # `submodule update -- <path>` reports "did not match any file(s) known to
              # git", which retrying only the submodule step cannot fix. So re-clone from
              # scratch each attempt. GIT_TERMINAL_PROMPT=0 turns an auth fallback into an
              # immediate (retryable) failure instead of a hang.
              n=0
              until
                rm -rf edk2 &&
                git clone --branch "$EDK2_TAG" --depth 1 https://github.com/tianocore/edk2.git &&
                git -C edk2 submodule update --init --depth 1 -- $SUBMODULES
              do
                n=$((n+1))
                [ "$n" -ge 5 ] && { echo "clone/submodule init failed after $n attempts"; exit 1; }
                echo "clone/submodule init failed; retry $n in ${n}0s"; sleep "${n}0"
              done
              cd edk2

              # FB21649319 workaround: swap the virtual generic-timer counter library
              # for the physical one so ArmVirtQemu uses the physical timer (PPI 30),
              # which the Apple vGIC delivers at EL2 (the virtual timer / PPI 27 does
              # not). This is the single line that changes the firmware behaviour.
              sed -i \
                "s#ArmGenericTimerVirtCounterLib/ArmGenericTimerVirtCounterLib.inf#ArmGenericTimerPhyCounterLib/ArmGenericTimerPhyCounterLib.inf#" \
                ArmVirtPkg/ArmVirt.dsc.inc
              grep -n "ArmGenericTimerCounterLib" ArmVirtPkg/ArmVirt.dsc.inc

              make -C BaseTools
              # edksetup.sh references $WORKSPACE before it sets it, which is
              # fatal under `set -u`; the edk2 build env is not nounset-clean,
              # so relax it across the source (edksetup exports WORKSPACE /
              # EDK_TOOLS_PATH itself).
              set +u
              source ./edksetup.sh
              set -u
              export GCC5_AARCH64_PREFIX=aarch64-linux-gnu-
              build -a AARCH64 -t GCC5 -b "$TARGET" -p ArmVirtPkg/ArmVirtQemu.dsc

              FV="Build/ArmVirtQemu-AARCH64/${TARGET}_GCC5/FV/QEMU_EFI.fd"
              ls -la "$FV"
              cp "$FV" /out/edk2-aarch64-code-phytimer.fd
            '
          ls -la "$PWD/out"
          echo "FW_BYTES=$(stat -c%s out/edk2-aarch64-code-phytimer.fd)" >> "$GITHUB_ENV"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: edk2-aarch64-code-phytimer
          path: out/edk2-aarch64-code-phytimer.fd
          if-no-files-found: error

      - name: Stage firmware into the repo
        run: |
          set -euxo pipefail
          mkdir -p internal/hvmm/firmware
          cp out/edk2-aarch64-code-phytimer.fd internal/hvmm/firmware/edk2-aarch64-code-phytimer.fd

      - name: Open PR with the firmware
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: ci/el2-physical-timer-firmware
          commit-message: "feat(hvmm): physical-timer edk2 firmware (FB21649319 workaround)"
          title: "feat(hvmm): physical-timer edk2 firmware (FB21649319 workaround)"
          body: |
            Auto-built EDK2 ArmVirtQemu AARCH64 firmware using the **physical**
            generic timer (`ArmGenericTimerPhyCounterLib`) instead of the virtual
            timer.

            Rationale: Apple bug **FB21649319** — a guest at EL2 with the in-kernel
            vGIC never receives the virtual-timer interrupt (CNTV/PPI 27). The
            physical-timer PPI *is* delivered, so `internal/hvmm` can drive edk2's
            timer events past the boot manager.

            - edk2 tag: `${{ github.event.inputs.edk2_tag || 'edk2-stable202408' }}`
            - target: `${{ github.event.inputs.build_target || 'DEBUG' }}`
            - size: `${{ env.FW_BYTES }}` bytes

            Built by `.github/workflows/build-el2-firmware.yml`.
          add-paths: internal/hvmm/firmware/edk2-aarch64-code-phytimer.fd
