name: api | Tests

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '.github/workflows/api-tests.yml'
      - 'internal/httpapi/**'
      - 'internal/acceptance/**'
      - 'internal/serve/**'
      - '**/*.go'

permissions:
  contents: read

jobs:
  # No-VM tier: OpenAPI validity + router/spec drift, the live schema-conformance
  # serve suite, and the spec linter. Runs on a hosted macOS runner because the
  # darwin-tagged code and the `weave serve` binary must execute natively.
  api-fast:
    name: '🔎 API schema + conformance'
    runs-on: macos-14
    steps:
      - name: Check Out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
          cache: true
          go-version: stable

      - name: Install vacuum (OpenAPI linter)
        run: |
          go install github.com/daveshanley/vacuum@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Lint the OpenAPI document
        run: make lint-openapi

      - name: Unit tests (spec validity + router drift)
        run: make test-api

      - name: Acceptance — serve suite (contract + live conformance)
        run: make acceptance-serve

  # Full happy-path against a real booted guest. GitHub-hosted macOS runners
  # cannot nest the Virtualization framework, and a macOS guest needs a ~20GB
  # IPSW, so this targets a self-hosted Apple-silicon runner and uses a small
  # Linux OCI image. Triggered manually to avoid blocking PRs when no such
  # runner is available.
  api-vm:
    name: '🖥️ API happy-path (Linux guest)'
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Check Out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          go-version: stable

      - name: Cache the Linux guest image
        run: |
          make build
          ./guestweave pull "${WEAVE_ACC_LINUX_IMAGE:-ghcr.io/cirruslabs/ubuntu:latest}"

      - name: Acceptance — api-vm suite
        run: make acceptance-api-vm
